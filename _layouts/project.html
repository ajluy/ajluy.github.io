---
layout: default
---
<div class="page-content--narrow">

  <a class="project-back" href="{{ '/' | relative_url }}">&larr; All Projects</a>

  <div class="project-header">
    {% if page.category %}
    <div class="project-row__tags" style="margin-bottom:0.75rem;">
      {% for cat in page.category %}
      <span class="tag">{{ cat }}</span>
      {% endfor %}
    </div>
    {% endif %}

    <h1 class="page-heading" style="margin-bottom:1.25rem;">{{ page.title }}</h1>

    {% if page.link and page.link != "" %}
    <a class="btn" href="{{ page.link }}" target="_blank" rel="noopener noreferrer">View Project &rarr;</a>
    {% endif %}
  </div>

  {% if page.image and page.image != "" %}
  <div class="project-image">
    <img src="{{ page.image | relative_url }}" alt="{{ page.title }}">
  </div>
  {% endif %}

  <div class="project-content">
    {{ content }}
  </div>

</div>
